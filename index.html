<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Сборник детские песни</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #2563eb;
      --border: #dbe3ef;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #edf4ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(31, 41, 55, 0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .links a {
      display: inline-block;
      margin-right: 12px;
      margin-top: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .note {
      margin-top: 20px;
      padding: 14px 16px;
      background: #eff6ff;
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Сборник детские песни</h1>
      <p>Официальная страница приложения для GitHub Pages.</p>
      <div class="links">
        <a href="privacy-policy.html">Политика конфиденциальности</a>
        <a href="app-ads.txt">app-ads.txt</a>
      </div>
      <div class="note">
        Перед публикацией замени контактный e-mail в политике конфиденциальности на реальный адрес поддержки.
      </div>
    </section>
  </main>
</body>
</html>
